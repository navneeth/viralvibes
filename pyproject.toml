[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "viralvibes"
version = "0.1.0"
description = "YouTube Trends Analysis - Discover what makes playlists go viral"
authors = [{name = "Navneeth", email = "navneeth@example.com"}]
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
keywords = ["youtube", "analytics", "fasthtml", "trends"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "python-fasthtml>=0.12.42",
    "starlette>=0.40.0",
    "MonsterUI>=0.3.0",
    "supabase>=2.0.0",
    "uvicorn>=0.30.1",
    "tenacity",
    "requests",
    "emoji-country-flag",
    "pycountry>=24.1.0",
    "isodate",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "pytest-asyncio",
    "ruff",
    "black",
    "mypy",
    "pre-commit",
]

[project.urls]
Homepage = "https://www.viralvibes.fyi"
Repository = "https://github.com/navneeth/viralvibes"
Documentation = "https://github.com/navneeth/viralvibes#readme"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--cov=.",
    "--cov-report=html",
    "--cov-report=term-missing:skip-covered",
]
