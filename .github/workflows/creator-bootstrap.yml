name: Creator Bootstrap

# Prime the creator_sync_jobs queue BEFORE the worker runs.
#
# This runs 10 minutes before each worker cycle to ensure jobs are ready.
# Handles large-scale queuing (500+ creators) that would slow down worker startup.
#
# Architecture:
#   1. Bootstrap (this file):  00:50, 06:50, 12:50, 18:50 UTC
#   2. Worker runs:            00:00, 06:00, 12:00, 18:00 UTC
#
# Bootstrap handles:
#   - Never-synced creators (last_synced_at IS NULL) - up to 500/run
#   - Stale synced creators (>7 days old) - up to 100/run
#   - Previously failed/invalid creators - up to 100/run
#
# Worker handles (on first iteration only):
#   - Small batches of unsynced creators found during startup (up to 100)
#   - This prevents race conditions if bootstrap is delayed

on:
  schedule:
    # Run 10 minutes BEFORE each worker cycle
    - cron: '50 23,5,11,17 * * *'  # 23:50, 05:50, 11:50, 17:50 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY:          ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-backend.txt

      - name: Queue creators for sync
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "▶ Bootstrap starting at $(date)"
          echo "════════════════════════════════════════════════════════════"

          python -m worker.bootstrap_creators \
            --unsynced-batch 500 \
            --stale-days 7 \
            --invalid-batch 50

          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "✅ Bootstrap finished at $(date)"
          echo "════════════════════════════════════════════════════════════"
