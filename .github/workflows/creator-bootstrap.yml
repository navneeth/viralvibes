name: Creator Bootstrap

# Prime the creator_sync_jobs queue BEFORE the worker runs.
#
# This runs 10 minutes before each worker cycle to ensure jobs are ready.
# Handles large-scale queuing (500+ creators) that would slow down worker startup.
#
# Architecture:
#   1. Bootstrap (this file):  23:50, 05:50, 11:50, 17:50 UTC
#   2. Worker runs:            00:00, 06:00, 12:00, 18:00 UTC
#
# Bootstrap handles:
#   - Never-synced creators (last_synced_at IS NULL) - up to 500/run
#   - Stale synced creators (>7 days old) - up to 100/run
#   - Previously failed/invalid creators - up to 100/run
#   - Category stats cache refresh (Pass 4)
#   - Hero stats materialized views refresh (Pass 5)
#
# Pass 6 (total_categories recount) is skipped here — it only needs to run
# weekly since category data changes slowly. See creator-bootstrap-weekly.yml.

on:
  schedule:
    # 10 minutes before each worker cycle (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '50 23,5,11,17 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY:          ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-backend.txt

      - name: Queue creators for sync
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "▶ Bootstrap starting at $(date)"
          echo "════════════════════════════════════════════════════════════"

          python -m worker.bootstrap_creators \
            --unsynced-batch 5000 \
            --stale-days 7 \
            --invalid-batch 50 \
            --no-categories

          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "✅ Bootstrap finished at $(date)"
          echo "════════════════════════════════════════════════════════════"
