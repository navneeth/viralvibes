name: Creator Stats Worker

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:        # Manual trigger always available

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never kill an in-progress sync

jobs:
  run-creator-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 75  # Hard ceiling. MAX_RUNTIME is 55 min, giving 20 min buffer.

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      YOUTUBE_API_KEY:               ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_DAILY_QUOTA:           "10000"

      # ── Runtime ───────────────────────────────────────────────────
      # Worker exits cleanly after MAX_RUNTIME seconds.
      # At BATCH_SIZE=10, POLL_INTERVAL=15s:
      #   → ~(3300 / 15) × 10 = ~2,200 creators per run
      #   × 4 runs/day = ~8,800 syncs/day — well within 10k quota
      CREATOR_WORKER_MAX_RUNTIME:       "3300"  # 55 min — exits before the 75m timeout
      CREATOR_WORKER_BATCH_SIZE:        "10"    # 10 creators per poll cycle
      CREATOR_WORKER_POLL_INTERVAL:     "15"    # seconds between poll cycles
      CREATOR_WORKER_EMPTY_BACKOFF_MAX: "60"    # max idle wait when queue is empty

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-backend.txt

      - name: Run creator worker
        run: |
          echo "▶ Creator worker starting at $(date)"
          python -m worker.creator_worker
          echo "✅ Creator worker finished at $(date)"
