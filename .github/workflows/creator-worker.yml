name: Creator Stats Worker

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours (4x/day) instead of once daily
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-progress sync

jobs:
  run-creator-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 75      # 60 jobs × 1 min avg = 60 min + 15 min buffer

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      YOUTUBE_API_KEY:               ${{ secrets.YOUTUBE_API_KEY }}

      # ── Memory Isolation Strategy ─────────────────────────────────
      # CRITICAL: Worker processes exactly 1 job per run, then exits.
      # This prevents httplib2 memory corruption that causes SSL errors
      # and segfaults. Each job gets a completely fresh Python process
      # and clean httplib2 state. We loop below to process multiple jobs.
      #
      # BATCH_SIZE and EXIT_AFTER_JOB are hardcoded in creator_worker.py
      # Do NOT override them here - memory corruption will return!

      CREATOR_WORKER_POLL_INTERVAL: "5"     # Fast poll when queue has jobs
      CREATOR_WORKER_MAX_RUNTIME:   "120"   # 2 min max per job (exits after 1)
      CREATOR_WORKER_EMPTY_BACKOFF_MAX: "10"  # Quick exit if queue empty

      # ── Quota ─────────────────────────────────────────────────────
      # 60 jobs × ~3 units = ~180 units/run × 4 runs/day = ~720 units/day
      # Well within 10,000 daily quota (7% usage)
      YOUTUBE_DAILY_QUOTA: "10000"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'       # 3.10 is EOL in October 2026
          cache: 'pip'                 # Cache dependencies between runs

      - name: Install dependencies
        run: pip install -r requirements-backend.txt

      - name: Run creator worker (loop for memory isolation)
        run: |
          echo "Starting creator worker loop at $(date)"
          echo "Strategy: 1 job per worker run, loop 60 times for complete memory isolation"
          echo ""

          JOBS_PROCESSED=0
          MAX_JOBS=60
          EMPTY_RUNS=0
          MAX_EMPTY_RUNS=3

          while [ $JOBS_PROCESSED -lt $MAX_JOBS ]; do
            ITERATION=$((JOBS_PROCESSED + 1))
            echo "════════════════════════════════════════════════════════════"
            echo "▶ Iteration $ITERATION/$MAX_JOBS - Fresh process start"
            echo "════════════════════════════════════════════════════════════"

            # Run worker - it will process exactly 1 job then exit
            if python -m worker.creator_worker; then
              echo "✅ Worker completed successfully"
              JOBS_PROCESSED=$((JOBS_PROCESSED + 1))
              EMPTY_RUNS=0
            else
              EXIT_CODE=$?
              echo "❌ Worker exited with code $EXIT_CODE"

              # If queue was empty, worker exits quickly - don't count as failure
              if [ $EXIT_CODE -eq 0 ]; then
                EMPTY_RUNS=$((EMPTY_RUNS + 1))
                echo "ℹ️  Queue may be empty (consecutive: $EMPTY_RUNS/$MAX_EMPTY_RUNS)"

                if [ $EMPTY_RUNS -ge $MAX_EMPTY_RUNS ]; then
                  echo "✅ Queue empty after $EMPTY_RUNS checks - stopping loop"
                  break
                fi
                sleep 5
              else
                echo "⚠️  Non-zero exit - job may have failed, continuing to next job"
                JOBS_PROCESSED=$((JOBS_PROCESSED + 1))
              fi
            fi

            echo ""
            sleep 2  # Brief pause between iterations
          done

          echo "════════════════════════════════════════════════════════════"
          echo "✅ Worker loop complete at $(date)"
          echo "   Jobs processed: $JOBS_PROCESSED"
          echo "════════════════════════════════════════════════════════════"
