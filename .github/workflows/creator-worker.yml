name: Creator Stats Worker

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:        # Manual trigger always available

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never kill an in-progress sync

jobs:
  run-creator-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 75  # Hard ceiling. Loop targets ~50 min, giving 25 min buffer.

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      YOUTUBE_API_KEY:               ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_DAILY_QUOTA:           "10000"

      # ── Runtime (per-process) ─────────────────────────────────────
      # Each process exits after 1 job (EXIT_AFTER_JOB=True in Python).
      # MAX_RUNTIME is a safety ceiling so a stuck process does not
      # block the loop indefinitely.
      CREATOR_WORKER_MAX_RUNTIME:       "120"   # 2 min safety ceiling per process
      CREATOR_WORKER_BATCH_SIZE:        "1"     # hardcoded in Python, kept for clarity
      CREATOR_WORKER_POLL_INTERVAL:     "5"     # fast poll — exits after 1 job anyway
      CREATOR_WORKER_EMPTY_BACKOFF_MAX: "10"    # quick exit when queue is empty

      # ── Loop Control (Tunable via env) ────────────────────────────
      # These control the bash loop that manages process isolation.
      # Adjust to change worker behavior without editing workflow logic.
      CREATOR_WORKER_EMPTY_RUNS_MAX:    "3"     # consecutive empty polls before exit
      CREATOR_WORKER_EMPTY_THRESHOLD:   "10"    # seconds below this = "queue empty"
      CREATOR_WORKER_EMPTY_BACKOFF:     "5"     # seconds to sleep between empty polls

      # Quota: 500 jobs x 3 units = 1,500 units/run x 4 runs/day = 6,000/day
      # Well within the 10,000 daily limit.

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-backend.txt

      - name: Run creator worker (loop for memory isolation)
        run: |
          echo "Creator worker loop starting at $(date)"
          echo "Strategy: 1 job per process, bounded by job timeout"

          # GitHub job timeout is 75 minutes. Keep a safety margin so we exit
          # before the workflow times out under sustained load.
          JOB_TIMEOUT_SECONDS=$((75 * 60))
          SAFETY_MARGIN_SECONDS=$((5 * 60))
          MAX_RUNTIME_BUDGET=$((JOB_TIMEOUT_SECONDS - SAFETY_MARGIN_SECONDS))

          # Derive MAX_JOBS from the per-process ceiling. Default to 120s if
          # CREATOR_WORKER_MAX_RUNTIME is not set.
          PER_PROCESS_MAX_RUNTIME=${CREATOR_WORKER_MAX_RUNTIME:-120}
          if [ "$PER_PROCESS_MAX_RUNTIME" -le 0 ]; then
            echo "Invalid CREATOR_WORKER_MAX_RUNTIME=$PER_PROCESS_MAX_RUNTIME, defaulting to 120s"
            PER_PROCESS_MAX_RUNTIME=120
          fi

          MAX_JOBS=$((MAX_RUNTIME_BUDGET / PER_PROCESS_MAX_RUNTIME))
          if [ "$MAX_JOBS" -lt 1 ]; then
            MAX_JOBS=1
          fi

          # Load tunable loop control parameters (with sensible defaults)
          EMPTY_RUNS_MAX=${CREATOR_WORKER_EMPTY_RUNS_MAX:-3}
          EMPTY_THRESHOLD=${CREATOR_WORKER_EMPTY_THRESHOLD:-10}
          EMPTY_BACKOFF=${CREATOR_WORKER_EMPTY_BACKOFF:-5}

          echo "Configured MAX_JOBS=$MAX_JOBS (budget=${MAX_RUNTIME_BUDGET}s, per-process max=${PER_PROCESS_MAX_RUNTIME}s)"
          echo "Loop control: EMPTY_RUNS_MAX=$EMPTY_RUNS_MAX, EMPTY_THRESHOLD=${EMPTY_THRESHOLD}s, EMPTY_BACKOFF=${EMPTY_BACKOFF}s"

          JOBS_PROCESSED=0
          EMPTY_RUNS=0
          LOOP_START_TIME=$(date +%s)

          while [ $JOBS_PROCESSED -lt $MAX_JOBS ]; do
            # Stop early if we are close to the workflow timeout.
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - LOOP_START_TIME))
            if [ "$ELAPSED" -ge "$MAX_RUNTIME_BUDGET" ]; then
              echo "Stopping worker loop: reached runtime budget of ${MAX_RUNTIME_BUDGET}s (elapsed=${ELAPSED}s)"
              break
            fi

            # First iteration: run diagnosis. Subsequent: skip to save DB round trips.
            # Always unset before exporting to avoid surprising behavior if variable is preset.
            unset CREATOR_WORKER_SKIP_DIAGNOSIS
            if [ $JOBS_PROCESSED -ne 0 ]; then
              export CREATOR_WORKER_SKIP_DIAGNOSIS=true
            fi

            START_TIME=$(date +%s)
            python -m worker.creator_worker
            EXIT_CODE=$?
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))

            if [ $EXIT_CODE -ne 0 ]; then
              echo "Worker exited with code $EXIT_CODE after ${DURATION}s — continuing"
              JOBS_PROCESSED=$((JOBS_PROCESSED + 1))
              EMPTY_RUNS=0
              sleep 2
              continue
            fi

            # A run under the threshold most likely means the queue was empty
            if [ $DURATION -lt $EMPTY_THRESHOLD ]; then
              EMPTY_RUNS=$((EMPTY_RUNS + 1))
              echo "Queue appears empty (${DURATION}s, consecutive empty: $EMPTY_RUNS/$EMPTY_RUNS_MAX)"
              if [ $EMPTY_RUNS -ge $EMPTY_RUNS_MAX ]; then
                echo "Queue empty - stopping loop after $JOBS_PROCESSED jobs"
                break
              fi
              sleep $EMPTY_BACKOFF
            else
              JOBS_PROCESSED=$((JOBS_PROCESSED + 1))
              EMPTY_RUNS=0
            fi
          done

          echo "Worker loop finished at $(date) — jobs processed: $JOBS_PROCESSED"
