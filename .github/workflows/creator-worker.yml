name: Creator Stats Worker

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours (4x/day) instead of once daily
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-progress sync

jobs:
  run-creator-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 75      # Tight buffer over the 60m MAX_RUNTIME

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      YOUTUBE_API_KEY:               ${{ secrets.YOUTUBE_API_KEY }}

      # ── Throughput ────────────────────────────────────────────────
      CREATOR_WORKER_BATCH_SIZE:    "15"    # Process this many creators at a time → 7.5x throughput
      CREATOR_WORKER_POLL_INTERVAL: "15"    # seconds between polls → tighter loop
      CREATOR_WORKER_MAX_RUNTIME:   "3300"  # 55 min in sec — leaves 20m safety margin

      # ── Quota ─────────────────────────────────────────────────────
      # 15 creators × ~3 units × (3300s/15s polls) = ~825 units/run
      # 4 runs/day × 825 = ~3,300 units/day — well within 10,000 limit
      YOUTUBE_DAILY_QUOTA: "10000"

      # ── Backlog bootstrap ─────────────────────────────────────────
      # Increase how many never-synced creators get queued per check.
      # The periodic check runs every 30 min inside the worker — with
      # 2 checks per 55m run and 500 per check, this clears 1,000
      # never-synced creators per run vs 200 previously.
      CREATOR_WORKER_EMPTY_BACKOFF_MAX: "60"  # Don't idle long when queue drains

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'       # 3.10 is EOL in October 2026
          cache: 'pip'                 # Cache dependencies between runs

      - name: Install dependencies
        run: pip install -r requirements-backend.txt

      - name: Run creator worker
        run: |
          echo "Starting creator worker at $(date)"
          echo "Pending queue depth before run:"
          python -m worker.creator_worker
          echo "Creator worker finished at $(date)"
