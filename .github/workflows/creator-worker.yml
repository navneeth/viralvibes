name: Creator Stats Worker

# Processes creator sync jobs queued by creator-bootstrap.yml
#
# Architecture:
#   1. Bootstrap queues jobs:  23:50, 05:50, 11:50, 17:50 UTC (runs BEFORE worker)
#   2. Worker processes jobs:  00:00, 06:00, 12:00, 18:00 UTC (this file)
#
# Worker features:
#   - Processes up to 500 jobs per run (frugal quota usage)
#   - Fresh Python process per job (prevents httplib2 memory corruption)
#   - Early exit when queue exhausted (saves Actions minutes)
#   - Bootstraps small batches on startup (safety net if bootstrap delayed)
#
# Quota budget: 500 jobs × 3 units = 1,500/run × 4 runs/day = 6,000/day (60% of 10k limit)

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:        # Manual trigger always available

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never kill an in-progress sync

jobs:
  run-creator-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 75  # Hard ceiling. Loop targets ~50 min, giving 25 min buffer.

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY:          ${{ secrets.SUPABASE_SERVICE_KEY }}
      YOUTUBE_API_KEY:               ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_DAILY_QUOTA:           "10000"

      # Each Python process exits after 1 job (EXIT_AFTER_JOB=True).
      # MAX_RUNTIME is a per-process safety ceiling only.
      CREATOR_WORKER_MAX_RUNTIME:       "120"
      CREATOR_WORKER_BATCH_SIZE:        "1"
      CREATOR_WORKER_POLL_INTERVAL:     "5"
      CREATOR_WORKER_EMPTY_BACKOFF_MAX: "10"

      # Quota: 500 jobs x 3 units = 1,500/run x 4 runs/day = 6,000/day (within 10k limit)

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-backend.txt

      - name: Run creator worker (loop for memory isolation)
        run: |
          # Disable set -e so the loop owns all exit code handling.
          # We'll re-enable it after the loop to ensure any post-loop failures are caught.
          # Without this, a Python crash (exit 134, SIGABRT from httplib2 heap
          # corruption) kills the entire bash script before EXIT_CODE=$? is reached.
          set +e

          echo "Creator worker loop starting at $(date)"

          JOBS_PROCESSED=0
          MAX_JOBS=500
          EMPTY_RUNS=0
          MAX_EMPTY_RUNS=3
          CRASHED_JOBS=0
          PURGED_CHANNELS=0

          while [ $JOBS_PROCESSED -lt $MAX_JOBS ]; do
            # First iteration: run diagnosis + queue unsynced creators.
            # Subsequent: skip to save DB round trips.
            if [ $JOBS_PROCESSED -eq 0 ] && [ $EMPTY_RUNS -eq 0 ]; then
              unset CREATOR_WORKER_SKIP_DIAGNOSIS
            else
              export CREATOR_WORKER_SKIP_DIAGNOSIS=true
            fi

            python -m worker.creator_worker
            EXIT_CODE=$?

            if [ "$EXIT_CODE" -eq 0 ]; then
              # Job processed successfully
              JOBS_PROCESSED=$((JOBS_PROCESSED + 1))
              EMPTY_RUNS=0
              echo "✅ Job $JOBS_PROCESSED completed"

            elif [ "$EXIT_CODE" -eq 2 ]; then
              # Queue was empty — no job found
              EMPTY_RUNS=$((EMPTY_RUNS + 1))
              echo "Queue empty (consecutive: $EMPTY_RUNS/$MAX_EMPTY_RUNS)"
              if [ $EMPTY_RUNS -ge $MAX_EMPTY_RUNS ]; then
                echo "✅ Queue exhausted - stopping after $JOBS_PROCESSED jobs processed"
                break
              fi
              # Shorter sleep when queue is empty - poll more frequently
              sleep 3

            else
              # Non-zero, non-2: crash or unhandled error (e.g. exit 134 SIGABRT).
              # Could be ChannelNotFoundException purge (which counts as "failed" job)
              # or actual Python crash. Log and continue.
              echo "⚠️  Worker exited with code $EXIT_CODE - counting as processed"
              JOBS_PROCESSED=$((JOBS_PROCESSED + 1))
              CRASHED_JOBS=$((CRASHED_JOBS + 1))
              EMPTY_RUNS=0
              sleep 2
            fi
          done

          # Re-enable error handling for any post-loop commands
          set -e

          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo "Creator worker loop finished at $(date)"
          echo "Summary:"
          echo "  - Jobs processed: $JOBS_PROCESSED"
          echo "  - Crashed/purged: $CRASHED_JOBS"
          echo "  - Empty queue runs: $EMPTY_RUNS"
          echo "═══════════════════════════════════════════════════════════"
