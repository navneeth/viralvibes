name: Creator Bootstrap (Weekly Full)

# Full bootstrap including Pass 6 (total_categories recount).
# Runs weekly on Sunday at 03:00 UTC — outside the normal worker cycles.
#
# Pass 6 computes COUNT(DISTINCT category) via a slow jsonb unnest (~4s).
# It's separated from the daily bootstrap to avoid wasting CI minutes on a
# stat that changes at most a few times per week.

on:
  schedule:
    - cron: '0 3 * * 0'   # Sunday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap-full:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY:          ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-backend.txt

      - name: Full bootstrap including total_categories recount
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "▶ Weekly full bootstrap starting at $(date)"
          echo "════════════════════════════════════════════════════════════"

          python -m worker.bootstrap_creators \
            --unsynced-batch 500 \
            --stale-days 7 \
            --invalid-batch 50

          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "✅ Weekly full bootstrap finished at $(date)"
          echo "════════════════════════════════════════════════════════════"
