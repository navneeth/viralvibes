services:
  # ⚙️ This service was created as a Render *Web Service* and its type cannot
  # be changed after creation. render_worker.py handles this by running a
  # minimal health-check HTTP server on $PORT alongside the supervisor loop.
  - type: web
    name: viralvibes-worker
    env: python
    pythonVersion: "3.12.0"
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install --no-cache-dir -r requirements-backend.txt
    startCommand: |
      echo $YOUTUBE_COOKIES | base64 -d > /tmp/cookies.txt
      python -m worker.render_worker
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: YOUTUBE_COOKIES
        sync: false

      # YouTube API keys — both are required.
      # YOUTUBE_API_KEY_CREATORS is used specifically by the creator worker
      # (see services/youtube_config.py). Set it even if the value is the same
      # as YOUTUBE_API_KEY — there is no automatic fallback between them.
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY_CREATORS
        sync: false

      # ── Supervisor tuning ─────────────────────────────────────────────────────
      # How long to sleep between polls when the queue is empty.
      - key: RENDER_IDLE_POLL_INTERVAL
        value: "60"
      # How often to run periodic maintenance (queue unsynced/stale creators).
      - key: RENDER_PERIODIC_CHECK_INTERVAL
        value: "300"
      # Log a warning after this many consecutive empty polls (not an exit).
      - key: RENDER_EMPTY_WARN_THRESHOLD
        value: "10"

      # ── Retained for code paths in creator_worker that still read them ────────
      - key: WORKER_POLL_INTERVAL
        value: "60"
      - key: WORKER_BATCH_SIZE
        value: "1"
      - key: COOKIES_FILE
        value: /tmp/cookies.txt
      # Skip the expensive DB diagnosis block in each subprocess — it runs once
      # in the supervisor at startup; re-running it per-job wastes ~9s on timeout.
      - key: CREATOR_WORKER_SKIP_DIAGNOSIS
        value: "true"
      - key: MIN_VIDEO_DELAY
        value: "3.0"
      - key: MAX_VIDEO_DELAY
        value: "8.0"
      - key: MIN_REQUEST_DELAY
        value: "5.0"
      - key: MAX_REQUEST_DELAY
        value: "10.0"
      - key: BOT_CHALLENGE_BACKOFF
        value: "1800"
      - key: YOUTUBE_DAILY_QUOTA
        value: "10000"
